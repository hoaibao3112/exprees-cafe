version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exprees-cafe-backend
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_DATABASE=${DB_DATABASE:-db.sqlite}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - POS_API_URL=${POS_API_URL}
      - POS_STORE_CODE=${POS_STORE_CODE}
      - POS_API_KEY=${POS_API_KEY}
      - POS_ADMIN_EMAIL=${POS_ADMIN_EMAIL}
      - POS_ADMIN_PASSWORD=${POS_ADMIN_PASSWORD}
    volumes:
      - ./backend/db.sqlite:/app/db.sqlite
      - ./backend/uploads:/app/uploads
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exprees-cafe-frontend
    restart: always
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_BACKEND_URL=http://backend:3000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
