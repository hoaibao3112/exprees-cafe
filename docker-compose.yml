version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exprees-cafe-backend
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_DATABASE=db.sqlite
      - JWT_SECRET=super-secret-access-token-key-32-chars-long-or-more
      - JWT_REFRESH_SECRET=super-secret-refresh-token-key-32-chars-long-or-more
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_EXPIRES_IN=7d
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
      # POS API Integration
      - POS_API_URL=http://103.188.82.245:6001
      - POS_STORE_CODE=aizen
      - POS_API_KEY=pk_52623926435f4abe50a7de1c7152bf5c8aae264af8f5870b
      - POS_ADMIN_EMAIL=baohoaitran3112@gmail.com
      - POS_ADMIN_PASSWORD=123456
    volumes:
      # Bảo toàn dữ liệu SQLite và thư mục ảnh upload trên VPS host
      - ./backend/db.sqlite:/app/db.sqlite
      - ./backend/uploads:/app/uploads
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exprees-cafe-frontend
    restart: always
    ports:
      - "3000:3000"  # Expose Next.js cổng 3000 ra ngoài VPS
    environment:
      - PORT=3000
      - NODE_ENV=production
      # NEXT_PUBLIC_API_URL dùng tương đối ở client-side
      - NEXT_PUBLIC_API_URL=/api/v1
      # NEXT_PUBLIC_BACKEND_URL dùng để Next.js proxy ngầm qua tên service docker
      - NEXT_PUBLIC_BACKEND_URL=http://backend:3000
      - JWT_SECRET=super-secret-access-token-key-32-chars-long-or-more
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
