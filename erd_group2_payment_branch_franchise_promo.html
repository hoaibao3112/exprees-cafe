
<style>
#erd2 svg { width: 100%; }
#erd2 svg.erDiagram .row-rect-odd path,
#erd2 svg.erDiagram .row-rect-odd rect,
#erd2 svg.erDiagram .row-rect-even path,
#erd2 svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div style="padding:0.5rem 0 0.25rem;font-size:13px;font-weight:500;color:var(--color-text-secondary)">Nhóm 2 — Payments · Branches · Franchise · Promotions</div>
<div id="erd2"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd2-svg', `erDiagram
  PAYMENTS {
    uuid id PK
    uuid order_id FK
    string method
    string gateway
    string gateway_txn_id
    string status
    decimal amount
    jsonb gateway_response
    timestamp paid_at
    timestamp created_at
  }
  BRANCHES {
    uuid id PK
    string name
    string address
    float lat
    float lng
    string phone
    jsonb opening_hours
    string status
    bool is_flagship
  }
  FRANCHISE_PACKAGES {
    uuid id PK
    string name
    string model_type
    decimal investment_from
    text description
    bool is_active
  }
  FRANCHISE_APPLICATIONS {
    uuid id PK
    uuid user_id FK
    uuid package_id FK
    string applicant_name
    string phone
    string province
    string status
    text notes
    timestamp submitted_at
  }
  PROMOTIONS {
    uuid id PK
    string name
    string type
    decimal discount_value
    string discount_type
    decimal min_order_value
    int max_uses
    int used_count
    timestamp starts_at
    timestamp ends_at
    bool is_active
  }
  COUPONS {
    uuid id PK
    uuid promotion_id FK
    string code UK
    uuid user_id FK
    int max_uses
    int used_count
    bool is_active
    timestamp expires_at
  }
  COUPON_USAGES {
    uuid id PK
    uuid coupon_id FK
    uuid order_id FK
    uuid user_id FK
    decimal discount_applied
    timestamp used_at
  }
  ORDERS {
    uuid id PK
    uuid branch_id FK
    string order_code UK
    string status
    decimal total
    timestamp created_at
  }
  ORDERS ||--o{ PAYMENTS : "paid via"
  BRANCHES ||--o{ ORDERS : "fulfills"
  FRANCHISE_PACKAGES ||--o{ FRANCHISE_APPLICATIONS : "applied for"
  PROMOTIONS ||--o{ COUPONS : "generates"
  COUPONS ||--o{ COUPON_USAGES : "used in"
  ORDERS ||--o{ COUPON_USAGES : "discounted by"
`);
document.getElementById('erd2').innerHTML = svg;
document.querySelectorAll('#erd2 svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd2 svg.erDiagram .row-rect-odd path, #erd2 svg.erDiagram .row-rect-even path').forEach(p => p.setAttribute('stroke','none'));
</script>
